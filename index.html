<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>GAME MATRIX</title>
  <style>
    /* ── TOKENS ───────────────────────────────────────────── */
    :root {
      --g0: #000000;
      --g1: #001a00;
      --g2: #003300;
      --g3: #006600;
      --g4: #00cc33;
      --g5: #00ff41;
      --g6: #aaffaa;
      --cyan: #00ffff;
      --yellow: #ffff00;
      --magenta: #ff44ff;
      --orange: #ff8800;
      --card-bg: rgba(0, 18, 0, 0.80);
      --card-hover: rgba(0, 35, 0, 0.95);
      --border: var(--g3);
      --border-bright: var(--g5);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--g0);
      color: var(--g5);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.10) 3px, rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 64px;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    .header {
      border: 1px solid var(--g5);
      padding: 26px 28px 22px;
      margin-bottom: 32px;
      background: rgba(0, 0, 0, 0.88);
      box-shadow:
        0 0 0 1px var(--g3),
        0 0 28px rgba(0,255,65,0.20),
        inset 0 0 28px rgba(0,255,65,0.04);
      text-align: center;
    }
    .header-eyebrow {
      font-size: 0.68em;
      letter-spacing: 0.55em;
      color: var(--g3);
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .header-title {
      font-size: 1.65em;
      letter-spacing: 0.05em;
      color: var(--g5);
      text-shadow: 0 0 14px var(--g5), 0 0 28px rgba(0,255,65,0.4);
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .header-platforms {
      font-size: 0.78em;
      color: var(--g4);
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      line-height: 1.8;
    }
    .header-ids {
      font-size: 0.68em;
      color: var(--g3);
      letter-spacing: 0.10em;
      margin-bottom: 14px;
      line-height: 1.9;
    }
    .header-ids span { color: var(--g4); }
    .type-badge {
      display: inline-block;
      border: 1px solid var(--g5);
      padding: 4px 18px;
      font-size: 0.72em;
      letter-spacing: 0.40em;
      color: var(--g5);
      text-shadow: 0 0 8px var(--g5);
      box-shadow: 0 0 8px rgba(0,255,65,0.25);
    }

    /* ── SECTION ──────────────────────────────────────────── */
    .section { margin-bottom: 30px; }
    .section-label {
      font-size: 0.72em;
      letter-spacing: 0.40em;
      color: var(--g5);
      border-bottom: 1px solid var(--g5);
      padding-bottom: 7px;
      margin-bottom: 14px;
      text-shadow: 0 0 6px var(--g5);
    }
    .generalist-label {
      font-size: 0.68em;
      letter-spacing: 0.35em;
      color: var(--g3);
      border-bottom: 1px dashed var(--g3);
      padding-bottom: 6px;
      margin: 24px 0 12px;
    }

    /* ── GRID ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
      gap: 8px;
    }

    /* ── CARD ─────────────────────────────────────────────── */
    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--g5);
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--border-bright);
      box-shadow: 0 0 16px rgba(0,255,65,0.30), inset 0 0 8px rgba(0,255,65,0.06);
      transform: translateX(4px);
    }
    .card-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    .card-arrow {
      color: var(--g3);
      font-size: 0.75em;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .card:hover .card-arrow { color: var(--g5); }
    .card-name {
      font-size: 0.88em;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── TAGS & ICONS ─────────────────────────────────────── */
    .tags {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: center;
    }

    .tag, .tag-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 4px;
      border: 1px solid;
      letter-spacing: 0.08em;
      white-space: nowrap;
      line-height: 1;
    }

    .tag {
      font-size: 0.56em;
    }

    .tag-icon svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
    }

    /* Platform Tag Colors */
    .tag-pc, .tag-phone, .tag-windows, .tag-linux, .tag-mac, .tag-dos { border-color: var(--cyan); color: var(--cyan); }
    .tag-android, .tag-ios { border-color: var(--orange); color: var(--orange); }
    .tag-switch { border-color: var(--magenta); color: var(--magenta); }
    .tag-playstation, .tag-ps5, .tag-ps4 { border-color: var(--yellow); color: var(--yellow); }
    .tag-xbox, .tag-xbox_series, .tag-xbox_one { border-color: var(--g6); color: var(--g6); }
    .tag-web, .tag-emulation, .tag-general { border-color: var(--g4); color: var(--g4); }

    /* ── NO-SIGNAL ────────────────────────────────────────── */
    .no-signal {
      text-align: center;
      padding: 80px 24px;
      border: 1px dashed var(--g3);
      background: rgba(0,0,0,0.7);
    }
    .no-signal-glyph {
      font-size: 3em;
      color: var(--g3);
      display: block;
      margin-bottom: 20px;
      animation: flicker 2.4s infinite;
    }
    .no-signal-title {
      font-size: 1.1em;
      letter-spacing: 0.4em;
      margin-bottom: 12px;
    }
    .no-signal-sub {
      font-size: 0.76em;
      color: var(--g3);
      line-height: 2;
      letter-spacing: 0.08em;
    }

    /* ── DOMAIN CHECKER ───────────────────────────────────── */
    .matrix-checker {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .matrix-input {
      width: 100%;
      max-width: 400px;
      padding: 10px 14px;
      background: rgba(0, 18, 0, 0.8);
      border: 1px solid var(--g3);
      color: var(--g5);
      font-family: inherit;
      font-size: 0.85em;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    .matrix-input:focus {
      border-color: var(--g5);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
    }
    .matrix-input::placeholder { color: var(--g3); opacity: 0.7; }
    .matrix-btn {
      padding: 10px 24px;
      background: transparent;
      border: 1px solid var(--g5);
      color: var(--g5);
      font-family: inherit;
      font-size: 0.75em;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .matrix-btn:hover {
      background: rgba(0, 255, 65, 0.1);
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.4);
    }
    .matrix-result {
      margin-top: 10px;
      font-size: 0.85em;
      letter-spacing: 0.1em;
      min-height: 1.2em;
      text-shadow: 0 0 8px currentColor;
      text-align: center;
      line-height: 1.8;
    }
    .matrix-result.found { color: var(--g5); }
    .matrix-result.not-found { color: var(--yellow); }
    .matrix-result .result-detail {
      font-size: 0.85em;
      color: var(--g4);
      margin-top: 6px;
    }

    /* ── DEBUG PANEL ──────────────────────────────────────── */
    .debug-toggle {
      display: block;
      width: 100%;
      margin-top: 40px;
      padding: 9px 14px;
      background: transparent;
      border: 1px dashed var(--g3);
      color: var(--g3);
      font-family: inherit;
      font-size: 0.68em;
      letter-spacing: 0.25em;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .debug-toggle:hover { border-color: var(--g5); color: var(--g5); }
    .debug-body {
      display: none;
      border: 1px dashed var(--g3);
      border-top: none;
      padding: 16px;
      background: rgba(0,0,0,0.92);
      font-size: 0.68em;
      line-height: 2.1;
      overflow-x: auto;
    }
    .debug-body.open { display: block; }
    .dbk { color: var(--g3); }
    .dbv { color: var(--g6); }
    .db-missing { color: var(--g2); font-style: italic; }
    .db-raw {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--g3);
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--g4);
      font-size: 0.95em;
    }

    @keyframes flicker {
      0%,100% { opacity: 1; }
      48% { opacity: 1; }
      50% { opacity: 0.3; }
      52% { opacity: 1; }
      93% { opacity: 1; }
      94% { opacity: 0.5; }
      96% { opacity: 1; }
    }

    @media (max-width: 520px) {
      .header-title { font-size: 1.2em; }
      .grid { grid-template-columns: 1fr; }
      #app { padding: 16px 12px 48px; }
    }
  </style>
</head>

/* ── Matrix Rain ──────────────────────────────────────────── */
(function(){
  const cv=document.getElementById('rain'),cx=cv.getContext('2d');
  const JP='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  const EN='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
  const CHARS=JP+EN,SZ=16;let drops=[],W=0,H=0;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;
    drops=Array.from({length:Math.ceil(W/SZ)},()=>Math.random()*-(H/SZ));}
  function tick(){cx.fillStyle='rgba(0,0,0,0.048)';cx.fillRect(0,0,W,H);
    for(let i=0;i<drops.length;i++){const r=Math.random();
      cx.fillStyle=r>0.97?'#ccffcc':r>0.85?'#00ff41':'#008f11';
      cx.font=`${r>0.97?15:13}px Courier New`;
      cx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)],i*SZ,drops[i]*SZ);
      if(drops[i]*SZ>H&&Math.random()>0.975)drops[i]=-Math.random()*20;
      drops[i]+=0.9+Math.random()*0.2;}}
  resize();addEventListener('resize',resize);setInterval(tick,52);
})();

/* ── Utility: slugify / plusify / underscoreify ──────────── */
function slugify(s){return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
  .toLowerCase().replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-');}
function underscoreify(s){return slugify(s).replace(/-/g,'_');}
function plusify(s){return encodeURIComponent(s).replace(/%20/g,'+');}

/* ── Decode payload from ?gm=<base64> ────────────────────── */
function decodePayload(){
  const gm=new URLSearchParams(location.search).get('gm');
  if(!gm)return null;
  try{return JSON.parse(decodeURIComponent(atob(gm)));}
  catch(e){console.error('[GameMatrix] decode failed:',e);return null;}
}

/* ── Map raw platform string → internal key ──────────────── */
function mapPlatform(raw){
  const lower=raw.toLowerCase().trim();
  if(PLATFORM_MAP[lower])return PLATFORM_MAP[lower];
  for(const[k,v]of Object.entries(PLATFORM_MAP)){
    if(lower.includes(k))return v;
  }
  if(lower.includes('nintendo')||lower.includes('playstation')||lower.includes('xbox')
     ||lower.includes('sega')||lower.includes('atari')||lower.includes('commodore')
     ||lower.includes('arcade')||lower.includes('neo geo')||lower.includes('turbo'))
    return 'emulation';
  return null;
}

/* ── Expand tokens from game data ────────────────────────── */
function expandTokens(game){
  const t={};
  if(game.title){
    t.TITLE=game.title;
    t.TITLE_PLUS=plusify(game.title);
    t.TITLE_SLUG=slugify(game.title);
    t.TITLE_UNDERSCORE=underscoreify(game.title);
  }
  if(game.year)t.YEAR=game.year;
  if(game.igdb)t.IGDB=String(game.igdb);
  if(game.infinitebacklog_id)t.INFINITEBACKLOG_ID=String(game.infinitebacklog_id);
  if(game.slug)t.INFINITEBACKLOG_SLUG=game.slug;
  if(game.genres&&game.genres.length)t.GENRES=game.genres.join(', ');
  if(game.developers&&game.developers.length)t.DEVELOPER=game.developers[0];
  if(game.publishers&&game.publishers.length)t.PUBLISHER=game.publishers[0];
  if(game.platforms&&game.platforms.length){
    const firstKey = mapPlatform(game.platforms[0]);
    if(firstKey) t.PRIMARY_PLATFORM = firstKey;
  }
  return t;
}

/* ── Tokens that are already URL-safe ────────────────────── */
const RAW_SAFE=new Set([
  'TITLE_SLUG','TITLE_UNDERSCORE','TITLE_PLUS',
  'IGDB','INFINITEBACKLOG_ID','YEAR',
  'PLATFORM','PRIMARY_PLATFORM'
]);

/* ── Resolve URL template ────────────────────────────────── */
function resolveUrl(tmpl, tokens, matchedPlatforms) {
  return tmpl.replace(/\{([^}]+)\}/g, (_, rawKey) => {
    const key = rawKey.trim();
    let val;
    
    // Resolve {PLATFORM} token to the first matched platform for this site
    if (key === 'PLATFORM') {
      val = matchedPlatforms && matchedPlatforms.length > 0 ? matchedPlatforms[0] : tokens.PRIMARY_PLATFORM;
    } else {
      val = tokens[key];
    }
    
    if (val === undefined || val === '' || val === '0') return '';
    return RAW_SAFE.has(key) ? val : encodeURIComponent(val);
  });
}

/* ── Get sorted internal platform keys for the game ──────── */
function getGamePlatformKeys(game) {
  const keys = new Set();
  if (game.platforms && game.platforms.length > 0) {
    for (const raw of game.platforms) {
      const key = mapPlatform(raw);
      if (key) keys.add(key);
    }
  }
  // Sort by platform order
  return [...keys].sort((a, b) => (PLATFORM_META[a]?.order || 999) - (PLATFORM_META[b]?.order || 999));
}

/* ── Check if site supports a specific platform key ──────── */
function siteSupportsPlatform(site, platformKey) {
  if (site.platforms.includes(platformKey)) return true;
  const sec = PLATFORM_META[platformKey]?.section;
  if (sec && site.platforms.includes(sec)) return true;
  return false;
}

/* ── Group sites by their first matched section ──────────── */
function getSitesForGame(game) {
  const gamePlatformKeys = getGamePlatformKeys(game);
  const sitesBySection = new Map(); // sectionKey -> { sites: [], platforms: Set }
  
  for (const site of SITES) {
    // Handle general sites separately so they don't get grouped into PC/etc.
    if (site.platforms.includes('general')) {
      if (!sitesBySection.has('general')) {
        sitesBySection.set('general', { sites: [], platforms: new Set() });
      }
      sitesBySection.get('general').sites.push({ site, matchedPlatforms: [] });
      continue;
    }

    const matchedPlatforms = [];
    for (const key of gamePlatformKeys) {
      if (siteSupportsPlatform(site, key)) {
        matchedPlatforms.push(key);
      }
    }
    
    if (matchedPlatforms.length > 0) {
      const firstPlatform = matchedPlatforms[0];
      const sectionKey = PLATFORM_META[firstPlatform]?.section || firstPlatform;
      
      if (!sitesBySection.has(sectionKey)) {
        sitesBySection.set(sectionKey, { sites: [], platforms: new Set() });
      }
      sitesBySection.get(sectionKey).sites.push({ site, matchedPlatforms });
    }
  }
  
  // Record which platforms the game actually has in each section
  for (const [sec, data] of sitesBySection.entries()) {
    for (const key of gamePlatformKeys) {
      const meta = PLATFORM_META[key];
      if (meta && meta.section === sec) {
        data.platforms.add(key);
      }
    }
    if (sec === 'general') {
      data.platforms.add('general');
    }
  }
  
  return sitesBySection;
}

/* ── Tags HTML ───────────────────────────────────────────── */
function tagsHtml(matchedPlatforms, suppressTags) {
  // Suppress if explicitly told (e.g. general category or only 1 platform in the section)
  if (suppressTags || !matchedPlatforms || matchedPlatforms.length === 0) return '';
  
  const tags = matchedPlatforms.map(key => {
    const sec = PLATFORM_META[key]?.section || 'default';
    const icon = PLATFORM_ICONS[key];
    
    if (icon) {
      return `<span class="tag-icon tag-${sec}">${icon}</span>`;
    }
    
    const label = PLATFORM_META[key]?.label || key.toUpperCase();
    return `<span class="tag tag-${sec}">${label}</span>`;
  });
  
  return '<span class="tags">' + tags.join('') + '</span>';
}

/* ── Card HTML ───────────────────────────────────────────── */
function cardHtml(site, tokens, matchedPlatforms, sectionPlatformCount, sectionKey) {
  const href = resolveUrl(site.url, tokens, matchedPlatforms);
  // Suppress tags if it's the general section, or if the game only supports 1 platform in this section
  const suppressTags = (sectionKey === 'general') || (sectionPlatformCount <= 1);
  const tags = tagsHtml(matchedPlatforms, suppressTags);
  return `<a class="card" href="${href}" target="_blank" rel="noopener noreferrer">
    <span class="card-left">
      <span class="card-arrow">&#9654;</span>
      <span class="card-name">${site.name}</span>
    </span>
    ${tags}
  </a>`;
}

/* ── Domain extractor ────────────────────────────────────── */
function getDomain(urlString){
  if(!urlString)return '';
  let d=urlString.replace(/^(https?:\/\/)?(www\.)?/i,'');
  d=d.split(/[\/:\?#]/)[0];
  return d.toLowerCase();
}

/* ── Domain Checker ──────────────────────────────────────── */
function initDomainChecker(){
  const input=document.getElementById('site-check-input');
  const btn=document.getElementById('site-check-btn');
  const result=document.getElementById('site-check-result');
  if(!input||!btn||!result)return;
  
  function check(){
    const val=input.value.trim();
    if(!val){result.textContent='';result.className='matrix-result';return;}
    const inputDomain=getDomain(val);
    let found=null;
    for(const site of SITES){
      if(getDomain(site.url)===inputDomain){found=site;break;}
    }
    if(found){
      const plats=found.platforms.join(', ').toUpperCase();
      result.innerHTML=`> DOMAIN FOUND IN MATRIX<div class="result-detail">Platforms: ${plats}</div>`;
      result.className='matrix-result found';
    }else{
      result.innerHTML=`> UNKNOWN DOMAIN<div class="result-detail">Not in Game Matrix database</div>`;
      result.className='matrix-result not-found';
    }
  }
  btn.addEventListener('click',check);
  input.addEventListener('keypress',e=>{if(e.key==='Enter')check();});
}

/* ── Main Render ─────────────────────────────────────────── */
function render(){
  const app=document.getElementById('app');
  const game=decodePayload();
  
  /* ── No signal ── */
  if(!game){
    app.innerHTML=`
      <div class="no-signal">
        <span class="no-signal-glyph">◈</span>
        <div class="no-signal-title">[ NO SIGNAL RECEIVED ]</div>
        <div class="no-signal-sub">
          This page should be opened from an InfiniteBacklog game page.<br>
          Install the Game Matrix userscript and click the button on any game.
        </div>
        <div class="matrix-checker">
          <input type="text" id="site-check-input" class="matrix-input" placeholder="Enter website domain to check...">
          <button id="site-check-btn" class="matrix-btn">CHECK DOMAIN</button>
          <div id="site-check-result" class="matrix-result"></div>
        </div>
      </div>`;
    initDomainChecker();
    return;
  }
  
  /* ── Incomplete signal ── */
  if(!game.title){
    app.innerHTML=`
      <div class="no-signal">
        <span class="no-signal-glyph">⚠</span>
        <div class="no-signal-title">[ INCOMPLETE SIGNAL ]</div>
        <div class="no-signal-sub">
          Game title was not found in the received payload.<br>
          Raw data: ${JSON.stringify(game).substring(0,200)}...
        </div>
        <div class="matrix-checker">
          <input type="text" id="site-check-input" class="matrix-input" placeholder="Enter website domain to check...">
          <button id="site-check-btn" class="matrix-btn">CHECK DOMAIN</button>
          <div id="site-check-result" class="matrix-result"></div>
        </div>
      </div>`;
    initDomainChecker();
    return;
  }
  
  /* ── Expand tokens ── */
  const tokens=expandTokens(game);
  
  /* ── Build header ── */
  const title=game.title||'';
  const year=game.year?` (${game.year})`:'';
  
  let platformsLine='';
  if(game.platforms&&game.platforms.length>0){
    platformsLine=`<div class="header-platforms">${game.platforms.join(' · ')}</div>`;
  }
  
  const idParts=[
    game.igdb&&`IGDB <span>${game.igdb}</span>`,
    game.slug&&`IB <span>${game.slug}</span>`,
    game.infinitebacklog_id&&`IB-ID <span>${game.infinitebacklog_id}</span>`,
  ].filter(Boolean);
  
  let html=`
    <div class="header">
      <div class="header-eyebrow">◈ GAME MATRIX ◈</div>
      <div class="header-title">${title}${year}</div>
      ${platformsLine}
      ${idParts.length?`<div class="header-ids">${idParts.join('  ·  ')}</div>`:''}
      <div class="type-badge">GAME</div>
    </div>`;
  
  /* ── Determine sections ── */
  const sitesBySection = getSitesForGame(game);
  
  // Sort sections by order
  const sortedSections = [...sitesBySection.entries()].sort((a, b) => {
    const orderA = SECTION_META[a[0]]?.order || 999;
    const orderB = SECTION_META[b[0]]?.order || 999;
    return orderA - orderB;
  });
  
  /* ── Render each section ── */
  for (const [sectionKey, data] of sortedSections) {
    const secMeta = SECTION_META[sectionKey];
    if (!secMeta) continue;
    
    const sites = data.sites;
    if (sites.length === 0) continue;
    
    let label = secMeta.label;
    const platformCount = data.platforms.size;
    
    // Dynamic label for grouped sections (PC, Phone, PlayStation, Xbox)
    if (['pc', 'phone', 'playstation', 'xbox'].includes(sectionKey)) {
      if (platformCount === 1) {
        const singlePlatKey = [...data.platforms][0];
        label = PLATFORM_META[singlePlatKey]?.label || secMeta.label;
      } else {
        label = secMeta.label;
      }
    }
    
    // Emulation label logic
    if (sectionKey === 'emulation' && platformCount > 1) {
      label += ' [' + [...data.platforms].map(k => PLATFORM_META[k]?.label || k).join(', ') + ']';
    }
    
    const labelClass = sectionKey === 'general' ? 'generalist-label' : 'section-label';
    
    html += `
      <div class="section">
        <div class="${labelClass}">${label}</div>
        <div class="grid">${sites.map(s => cardHtml(s.site, tokens, s.matchedPlatforms, platformCount, sectionKey)).join('')}</div>
      </div>`;
  }
  
  /* ── Debug panel ── */
  const debugFields=[
    ['title','TITLE'],
    ['igdb','IGDB ID'],
    ['infinitebacklog_id','InfiniteBacklog ID'],
    ['slug','InfiniteBacklog Slug'],
    ['year','Release Year'],
    ['platforms','Platforms'],
    ['genres','Genres'],
    ['developers','Developers'],
    ['publishers','Publishers'],
    ['cover','Cover Image'],
    ['franchise','Franchise'],
    ['themes','Themes'],
    ['modes','Modes'],
    ['rating','Rating'],
  ];
  
  const dbRows=debugFields.map(([key,label])=>{
    const v=game[key];
    if(v===undefined||v===null||v===''){
      return `<span class="db-missing">${label} — not provided</span>`;
    }
    const display=Array.isArray(v)?v.join(', '):v;
    return `<span class="dbk">${label}</span> = <span class="dbv">${display}</span>`;
  }).join('<br>');
  
  const rawJson=JSON.stringify(game,null,2);
  
  html+=`
    <button class="debug-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
      &#9654; SHOW RAW SIGNAL DATA
    </button>
    <div class="debug-body">
      ${dbRows}
      <div class="db-raw">${rawJson.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
